---
name: PR Lint

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  packages: read
  statuses: write

env:
  VALIDATE_JAVASCRIPT_PRETTIER: false
  JAVASCRIPT_ES_CONFIG_FILE: eslint.config.mjs


jobs:
  SuperLinter:
    uses: ivuorinen/ivuorinen/.github/workflows/pr-lint.yml@main
